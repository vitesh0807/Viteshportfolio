<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vitesh Kachapuram — Portfolio</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800;900&family=Orbitron:wght@400;600;900&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script>// Babel in-browser is intentional for this standalone HTML portfolio</script>
  <script>
    // Define tailwind config before CDN loads - this is the correct approach
    window.tailwind = {
      config: {
        theme: {
          extend: {
            fontFamily: {
              orbitron: ['Orbitron','monospace'],
              syne: ['Syne','sans-serif'],
              mono: ['Space Mono','monospace'],
            },
            colors: {
              void:'#050508', panel:'#0a0a10', border:'#1a1a2e',
              neon:'#00ffe7', plasma:'#7b2fff', rust:'#ff5c2b',
              dim:'#3a3a5c', muted:'#6b6b8a', ghost:'#c0c0d8',
            },
          }
        }
      }
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{background:#050508;color:#c0c0d8;font-family:'Space Mono',monospace;overflow-x:hidden;cursor:none}
    .cursor{position:fixed;width:12px;height:12px;background:#00ffe7;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);box-shadow:0 0 10px #00ffe7,0 0 20px #00ffe740}
    .cursor-ring{position:fixed;width:36px;height:36px;border:1px solid #00ffe755;border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all 0.15s}
    .grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(0,255,231,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,231,0.025) 1px,transparent 1px);background-size:50px 50px}
    @keyframes scan{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}
    @keyframes flicker{0%,95%,100%{opacity:1}96%{opacity:0.5}97%{opacity:1}98%{opacity:0.3}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
    @keyframes slideUp{0%{opacity:0;transform:translateY(40px)}100%{opacity:1;transform:translateY(0)}}
    @keyframes glitch{0%,88%,100%{transform:translate(0)}90%{transform:translate(-3px,1px)}92%{transform:translate(3px,-1px)}94%{transform:translate(-1px,2px)}}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes borderPulse{0%,100%{border-color:#00ffe730}50%{border-color:#00ffe770}}
    @keyframes countUp{from{opacity:0;transform:scale(0.5)}to{opacity:1;transform:scale(1)}}
    .scanline{position:fixed;top:0;left:0;right:0;height:3px;z-index:1;background:linear-gradient(transparent,#00ffe720,transparent);animation:scan 5s linear infinite;pointer-events:none}
    .glow{text-shadow:0 0 10px #00ffe7,0 0 30px #00ffe740}
    .glow-p{text-shadow:0 0 10px #7b2fff,0 0 25px #7b2fff40}
    .glow-r{text-shadow:0 0 10px #ff5c2b,0 0 25px #ff5c2b40}
    .nav-link-retro{font-family:'Space Mono',monospace;font-size:0.68rem;letter-spacing:0.15em;text-transform:uppercase;color:#6b6b8a;text-decoration:none;padding:6px 0;border-bottom:1px solid transparent;transition:all 0.2s}
    .nav-link-retro:hover{color:#00ffe7;border-color:#00ffe7}
    .retro-card{background:#0a0a10;border:1px solid #1a1a2e;position:relative;overflow:hidden;transition:border-color 0.3s,transform 0.3s}
    .retro-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#00ffe7,transparent);opacity:0;transition:opacity 0.3s}
    .retro-card:hover{border-color:#00ffe740;transform:translateY(-4px)}
    .retro-card:hover::before{opacity:1}
    .tag{display:inline-block;font-family:'Space Mono',monospace;font-size:0.58rem;letter-spacing:0.1em;text-transform:uppercase;padding:3px 8px;border:1px solid}
    .section-label{font-family:'Space Mono',monospace;font-size:0.65rem;letter-spacing:0.25em;text-transform:uppercase;color:#00ffe7}
    .orb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none}
    .skill-bar-fill{transition:width 1.5s cubic-bezier(0.4,0,0.2,1)}
    .timeline-dot{width:10px;height:10px;border-radius:50%;background:#00ffe7;flex-shrink:0;margin-top:5px;box-shadow:0 0 8px #00ffe7}
    .fade-in{opacity:0;transform:translateY(30px);transition:opacity 0.7s ease,transform 0.7s ease}
    .fade-in.visible{opacity:1;transform:translateY(0)}
    .photo-frame{position:relative;border-radius:50%;overflow:hidden;border:2px solid #00ffe740;box-shadow:0 0 30px #00ffe720,0 0 60px #7b2fff10}
    .social-btn{display:flex;align-items:center;gap:8px;padding:10px 16px;border:1px solid #1a1a2e;background:#0a0a10;text-decoration:none;font-family:'Space Mono',monospace;font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;transition:all 0.2s;color:#6b6b8a}
    .social-btn:hover{border-color:#00ffe740;color:#00ffe7;transform:translateY(-2px)}
    .project-link{font-family:'Space Mono',monospace;font-size:0.6rem;color:#00ffe7;text-decoration:none;letter-spacing:0.1em;border-bottom:1px solid #00ffe740;padding-bottom:1px;transition:all 0.2s}
    .project-link:hover{color:#7b2fff;border-color:#7b2fff}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:#050508}
    ::-webkit-scrollbar-thumb{background:#1a1a2e;border-radius:2px}
    ::-webkit-scrollbar-thumb:hover{background:#00ffe730}
    /* ── MOBILE RESPONSIVE ── */
    @media(max-width:991px){
      .hide-mobile{display:none!important}
    }
    @media(max-width:768px){
      /* Hero */
      .hero-name{font-size:2.2rem!important;letter-spacing:-0.01em!important}
      section{padding-top:4rem!important;padding-bottom:4rem!important}
      /* Nav */
      nav .max-w-6xl{padding-left:1rem!important;padding-right:1rem!important}
      /* Orbs - hide on mobile for perf */
      .orb{display:none!important}
      /* Photo frame in hero - smaller */
      .photo-frame{width:220px!important;height:220px!important}
      /* Floating tags around photo */
      .tag[style*="position:absolute"]{display:none!important}
      /* General padding */
      .max-w-6xl,.max-w-5xl,.max-w-4xl,.max-w-3xl{padding-left:1rem!important;padding-right:1rem!important}
      /* Cards */
      .retro-card{padding:1.25rem!important}
      /* Section headings */
      h2.font-syne{font-size:1.8rem!important}
      /* Timeline */
      .timeline-dot{margin-top:3px}
      /* Footer */
      footer .d-flex{flex-direction:column!important;align-items:center!important;text-align:center!important;gap:0.5rem!important}
      /* Contact CTA */
      a[href^="mailto"]{font-size:0.6rem!important;padding:0.75rem 1.5rem!important;word-break:break-all}
      /* Skill grid - single col */
      .col-6{width:100%!important}
    }
    @media(max-width:576px){
      .hero-name{font-size:1.9rem!important}
      h2.font-syne{font-size:1.5rem!important}
      /* Stats row - 2 cols */
      .col-md-3{width:50%!important}
      /* Social grid - 2 cols */
      .col-md-4{width:50%!important}
      /* Content creator cards */
      .col-md-5{width:100%!important}
      /* Loka stats */
      .col-sm-3{width:50%!important}
      /* Timeline - compress left label */
    }
    /* Fix hero column order on mobile - photo above text */
    @media(max-width:991px){
      .hero-photo-col{order:-1!important;margin-bottom:2rem}
      .hero-photo-col > div{width:200px!important;height:200px!important}
    }
    /* Fix nav overflow */
    @media(max-width:400px){
      .hero-name{font-size:1.6rem!important}
      nav .font-orbitron{font-size:0.8rem!important}
    }
    /* Global text visibility fixes */
    .font-mono{color:#c0c0d8}
    .font-syne{color:#c0c0d8}
    .font-orbitron{color:#c0c0d8}
    p,span,div,a,h1,h2,h3,h4{color:inherit}
    .text-ghost{color:#c0c0d8!important}
    .text-muted{color:#6b6b8a!important}
    .text-neon{color:#00ffe7!important}
    .text-plasma{color:#7b2fff!important}
    .text-rust{color:#ff5c2b!important}
    input,button,select,textarea{color:#c0c0d8}
    /* Ensure no black text anywhere */
    *{color:inherit}
    body{color:#c0c0d8!important}
    .retro-card *:not([style*="color"]){color:#c0c0d8}

    /* Mobile padding helpers */
    @media(max-width:768px){
      .py-8{padding-top:2rem!important;padding-bottom:2rem!important}
      .px-4{padding-left:1rem!important;padding-right:1rem!important}
      .px-6{padding-left:1.25rem!important;padding-right:1.25rem!important}
      .gap-3{gap:0.6rem!important}
      .mb-8{margin-bottom:1.5rem!important}
      .mb-6{margin-bottom:1rem!important}
      /* Hero text */
      .hero-name{line-height:1.1!important}
      /* Floating tags in hero - hide all absolute positioned on mobile */
      [style*="position:absolute"][style*="fontSize:'0.55rem'"]{display:none!important}
      /* Nav menu mobile */
      .nav-link-retro{font-size:0.75rem!important;padding:8px 0!important}
      /* Social buttons wrap */
      .social-btn{min-width:0!important;flex:1 1 120px}
      /* Project links */
      .project-link{font-size:0.65rem!important}
      /* Loka card image */
      img[alt="Loka Logo"]{width:120px!important;height:120px!important}
      /* Hero photo size */
      [style*="width:'300px'"]{width:200px!important;height:200px!important}
    }
    /* Ensure rows don't overflow */
    .row{margin-left:0!important;margin-right:0!important}
    @media(max-width:576px){
      .row > [class*="col-"]{padding-left:0.5rem!important;padding-right:0.5rem!important}
    }

    @media(max-width:991px){
      .hero-photo-wrapper{width:220px!important;height:220px!important}
    }
    @media(max-width:576px){
      .hero-photo-wrapper{width:180px!important;height:180px!important}
    }
  </style>
</head>

    function TypeWriter({texts}){
      const [idx,setIdx]=useState(0);
      const [displayed,setDisplayed]=useState('');
      const [deleting,setDeleting]=useState(false);
      useEffect(()=>{
        const current=texts[idx];let timer;
        if(!deleting&&displayed.length<current.length){timer=setTimeout(()=>setDisplayed(current.slice(0,displayed.length+1)),65);}
        else if(!deleting&&displayed.length===current.length){timer=setTimeout(()=>setDeleting(true),2000);}
        else if(deleting&&displayed.length>0){timer=setTimeout(()=>setDisplayed(displayed.slice(0,-1)),32);}
        else if(deleting&&displayed.length===0){setDeleting(false);setIdx((idx+1)%texts.length);}
        return()=>clearTimeout(timer);
      },[displayed,deleting,idx]);
      return <span className="text-neon glow font-mono">{displayed}<span className="animate-pulse">█</span></span>;
    }

                      <p className="font-mono text-muted mb-4" style={{fontSize:'0.68rem',lineHeight:'1.8'}}>{c.desc}</p>
